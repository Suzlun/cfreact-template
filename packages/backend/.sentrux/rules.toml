# Sentrux architectural rules for the backend application package.
# Backend scores higher when package-level tests/config are included in the current Sentrux scoring model.

[constraints]
# 循環依存は構造劣化の早期兆候なので常に禁止する。
max_cycles = 0
# usecase / adapter の関数複雑度が過度に上がった場合に検知する。
max_cc = 30
# 既存コードの上限を超えない範囲で関数肥大化を検知する。
max_fn_lines = 150
# 巨大ファイルはSentruxスコアで観測し、現時点では失敗条件にしない。
no_god_files = false

[[layers]]
name = "types"
paths = ["src/types/**"]
order = 5

[[layers]]
name = "domain"
paths = ["src/domain/**"]
order = 4

[[layers]]
name = "usecases"
paths = ["src/usecases/**"]
order = 3

[[layers]]
name = "drizzle"
paths = ["src/drizzle/**"]
order = 3

[[layers]]
name = "persistence"
paths = ["src/persistence/**"]
order = 2

[[layers]]
name = "http"
paths = ["src/http/**"]
order = 2

[[layers]]
name = "app"
paths = ["src/app/**"]
order = 1

[[layers]]
name = "entry"
paths = ["src/entry/**"]
order = 0

[[boundaries]]
from = "src/http/**"
to = "src/persistence/**"
reason = "Backend HTTP adapters must use use cases instead of depending on persistence directly."

[[boundaries]]
from = "src/domain/**"
to = "src/http/**"
reason = "Backend domain must not depend on HTTP adapters."

[[boundaries]]
from = "src/domain/**"
to = "src/persistence/**"
reason = "Backend domain must not depend on persistence adapters."
