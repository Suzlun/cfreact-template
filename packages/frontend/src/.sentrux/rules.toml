# Sentrux architectural rules for frontend source code.
# Shared UI is consumed through the @cfreact-template/ui workspace package and is outside this app-layer graph.

[constraints]
# 循環依存は構造劣化の早期兆候なので常に禁止する。
max_cycles = 0
# app / domain / api の関数複雑度が過度に上がった場合に検知する。
max_cc = 30
# 既存コードの上限を超えない範囲で関数肥大化を検知する。
max_fn_lines = 150
# 巨大ファイルはSentruxスコアで観測し、現時点では失敗条件にしない。
no_god_files = false

[[layers]]
name = "api"
paths = ["api/**"]
order = 2

[[layers]]
name = "domain"
paths = ["domain/**"]
order = 1

[[layers]]
name = "app"
paths = ["app/**"]
order = 0

[[boundaries]]
from = "app/**"
to = "api/**"
reason = "Frontend app must use domain hooks instead of importing the API layer directly."
