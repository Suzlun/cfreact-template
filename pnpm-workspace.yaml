packages:
  - 'packages/*'
  - 'packages/frontend/*'
  - 'packages/backend/*'

# Wait 2 days after npm publish before resolving new dependency versions.
minimumReleaseAge: 2880

allowBuilds:
  '@fission-ai/openspec': true
  esbuild: true
  msw: true
  sharp: true
  unrs-resolver: true
  workerd: true

overrides:
  react: 19.2.7
  react-dom: 19.2.7
  '@tanstack/react-query': 5.101.0
