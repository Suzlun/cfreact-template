packages:
  - 'packages/*'

# Wait 72 hours after npm publish before resolving new dependency versions.
minimumReleaseAge: 4320

allowBuilds:
  '@fission-ai/openspec': true
  esbuild: true
  msw: true
  sharp: true
  unrs-resolver: true
  workerd: true

peerDependencyRules:
  allowedVersions:
    tailwindcss: '>=3.0.0'

overrides:
  react: 19.2.7
  react-dom: 19.2.7
  '@tanstack/react-query': 5.101.0
  esbuild: 0.28.1
  ws: 8.21.0
  'eslint-plugin-sonarjs>minimatch': 10.2.5
  '@boundaries/elements>handlebars': 4.7.9
  'concurrently>shell-quote': 1.8.4
