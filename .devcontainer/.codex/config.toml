model = "gpt-5.1-codex"
model_reasoning_effort = "high"

# playwright mcpを使うにはAMD64である必要がある。プロジェクトを調整し、DockerfileイメージにChromeインストールを加えること
[mcp_servers.playwright]
command = "npx"
args = ["@playwright/mcp@latest"]

[mcp_servers.serena]
command = "uvx"
args = ["--from", "git+https://github.com/oraios/serena", "serena", "start-mcp-server", "--context", "codex", "--project", "/workspaces/cfreact-template"]
