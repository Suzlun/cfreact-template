name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-branch
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      WRANGLER_ENVIRONMENT: ${{ vars.WRANGLER_ENVIRONMENT || 'production' }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Setup pnpm
        run: |
          # リポジトリが固定する pnpm を使い、Release と CI の依存解決を一致させます。
          corepack enable
          corepack prepare pnpm@11.7.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Sentrux latest
        run: sh .devcontainer/scripts/install-sentrux.sh

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm check

      - name: Unit tests
        run: pnpm test:run

      - name: Codegen drift check
        run: pnpm check:codegen

      - name: Build
        run: pnpm build

      - name: Update deploy branch
        run: |
          # Cloudflare Deploy Button が slash なしの安定した branch を参照できるようにします。
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git push --force origin HEAD:refs/heads/deploy

      - name: Provision Cloudflare resources for Actions CD
        id: provision
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        run: |
          # GitHub Actions 直接CDではDeploy Buttonのprovisioningが走らないため、D1/KV/R2を冪等に用意します。
          pnpm release:provision-cloudflare

      - name: Deploy with Wrangler from Actions
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        run: |
          # 実ID入りの一時configを使い、このrepo構造のままbackend entryとfrontend assetsを同一Workerへdeployします。
          pnpm exec wrangler deploy --config "${{ steps.provision.outputs.wrangler_config }}" --env "${WRANGLER_ENVIRONMENT}"

      - name: Skip Actions deploy
        if: ${{ env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == '' }}
        run: |
          # Secret / Variable が未設定の場合はDeploy Button向けbranch更新だけで終了します。
          printf '%s\n' 'Actions deploy skipped: set CLOUDFLARE_API_TOKEN secret and CLOUDFLARE_ACCOUNT_ID variable or secret to deploy from GitHub Actions.'
