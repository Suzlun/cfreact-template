name: Changeset Check

on:
  pull_request:
    branches:
      - develop
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

jobs:
  require-changeset:
    name: Require Changeset
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout trusted checker
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          # PRのコードを実行せずbase側の検査scriptだけを使用し、fork PRでも秘密情報を扱いません。
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Require a newly added Changeset
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/release/check-pr-changeset.mjs
