name: Deploy

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Deployする既存のvX.Y.Zタグ
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy To Cloudflare
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      WRANGLER_ENVIRONMENT: ${{ vars.WRANGLER_ENVIRONMENT || 'production' }}
    steps:
      - name: Detect Cloudflare credentials
        id: credentials
        run: |
          # リリースとdeployを独立させ、credentials未設定の生成先では安全にdeployだけを省略します。
          if [ -n "${CLOUDFLARE_API_TOKEN}" ] && [ -n "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            printf '%s\n' 'configured=true' >> "${GITHUB_OUTPUT}"
          else
            printf '%s\n' 'configured=false' >> "${GITHUB_OUTPUT}"
            printf '%s\n' 'Deploy skipped: configure CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID in the production environment.'
          fi

      - name: Checkout release tag
        if: ${{ steps.credentials.outputs.configured == 'true' }}
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          # tag pushはそのref、手動実行は入力された既存tagをcheckoutします。
          ref: ${{ github.event_name == 'push' && github.ref || inputs.tag }}
          fetch-depth: 0

      - name: Setup Node
        if: ${{ steps.credentials.outputs.configured == 'true' }}
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Setup pnpm
        if: ${{ steps.credentials.outputs.configured == 'true' }}
        run: |
          # release commitのpackage managerを再現し、tagごとのbuild結果を安定させます。
          corepack enable
          corepack prepare pnpm@11.7.0 --activate

      - name: Install dependencies
        if: ${{ steps.credentials.outputs.configured == 'true' }}
        run: pnpm install --frozen-lockfile

      - name: Validate release tag
        if: ${{ steps.credentials.outputs.configured == 'true' }}
        env:
          DEPLOY_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.tag }}
        run: |
          # 保護されたmainへ取り込まれ、tag名、全manifest、CHANGELOGが一致するcommitだけをdeployします。
          git fetch origin main
          if ! git merge-base --is-ancestor HEAD origin/main; then
            printf '%s\n' "${DEPLOY_TAG} does not point to a commit contained in main." >&2
            exit 1
          fi
          expected_tag=$(node -p "'v' + JSON.parse(require('node:fs').readFileSync('.release/plan.json', 'utf8')).version")
          if [ "${DEPLOY_TAG}" != "${expected_tag}" ]; then
            printf '%s\n' "Tag mismatch: expected ${expected_tag}, received ${DEPLOY_TAG}." >&2
            exit 1
          fi
          node scripts/release/validate-release.mjs

      - name: Build
        if: ${{ steps.credentials.outputs.configured == 'true' }}
        run: pnpm build

      - name: Provision Cloudflare resources
        id: provision
        if: ${{ steps.credentials.outputs.configured == 'true' }}
        run: |
          # 生成先repositoryのD1、KV、R2を名前から冪等に準備します。
          pnpm release:provision-cloudflare

      - name: Deploy with Wrangler
        if: ${{ steps.credentials.outputs.configured == 'true' }}
        run: |
          # account固有IDをrepositoryへ保存せず、workflow内で生成した一時configだけをdeployに使用します。
          pnpm exec wrangler deploy --config "${{ steps.provision.outputs.wrangler_config }}" --env "${WRANGLER_ENVIRONMENT}"
