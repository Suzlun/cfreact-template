name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      WRANGLER_ENVIRONMENT: ${{ vars.WRANGLER_ENVIRONMENT || 'production' }}
    steps:
      - name: Skip deploy without Cloudflare credentials
        if: ${{ env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == '' }}
        run: |
          # Cloudflareの認証情報が未設定の場合は、秘密情報を要求せず安全にdeployだけを停止します。
          printf '%s\n' 'Deploy skipped: set CLOUDFLARE_API_TOKEN secret and CLOUDFLARE_ACCOUNT_ID variable or secret to deploy from GitHub Actions.'

      - name: Checkout
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Setup pnpm
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        run: |
          # CIと同じpnpmを使い、installとbuildの再現性を保ちます。
          corepack enable
          corepack prepare pnpm@11.7.0 --activate

      - name: Install dependencies
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        run: pnpm install --frozen-lockfile

      - name: Build
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        run: pnpm build

      - name: Provision Cloudflare resources
        id: provision
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        run: |
          # GitHub ActionsではDeploy Buttonのprovisioningが走らないため、D1/KV/R2を冪等に用意します。
          pnpm release:provision-cloudflare

      - name: Deploy with Wrangler
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        run: |
          # 実ID入りの一時configを使い、公開repoへaccount固有IDを残さずdeployします。
          pnpm exec wrangler deploy --config "${{ steps.provision.outputs.wrangler_config }}" --env "${WRANGLER_ENVIRONMENT}"
