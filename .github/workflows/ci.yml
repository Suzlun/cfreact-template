name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.16.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release branch
        if: ${{ github.event_name == 'pull_request' && github.head_ref == 'release' && github.base_ref == 'main' }}
        run: |
          # Release PRが最新developを祖先に持ち、単一versionとCHANGELOGが確定していることを検証します。
          git fetch origin develop
          node scripts/release/validate-release.mjs --develop-ref origin/develop

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm check

      - name: Unit tests
        run: pnpm test:run

      - name: Build Storybook
        run: pnpm build:storybook

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox webkit

      - name: Storybook browser tests
        run: pnpm test:storybook

      - name: End-to-end tests
        run: pnpm test:e2e

      - name: Codegen drift check
        run: pnpm check:codegen
