name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:
    inputs:
      automation_kind:
        description: 検証する自動化PRの種別
        required: true
        type: choice
        options:
          - release
          - sync
      expected_sha:
        description: 検証対象branchの完全SHA
        required: true
        type: string
      pull_request_number:
        description: 検証対象Pull Request番号
        required: true
        type: string

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.expected_sha || github.sha }}

      - name: Verify dispatched commit
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          EXPECTED_SHA: ${{ inputs.expected_sha }}
        run: |
          # branch更新後の古いdispatchを成功させず、PRへ表示するcheckを完全SHAへ固定します。
          test "$(git rev-parse HEAD)" = "${EXPECTED_SHA}"

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.16.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release branch
        if: >-
          ${{
            (github.event_name == 'pull_request' && github.head_ref == 'release' && github.base_ref == 'main') ||
            (github.event_name == 'workflow_dispatch' && inputs.automation_kind == 'release')
          }}
        run: |
          # Release PRが最新developを祖先に持ち、単一versionとCHANGELOGが確定していることを検証します。
          git fetch origin develop
          node scripts/release/validate-release.mjs --develop-ref origin/develop

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        env:
          # 型付きESLintの各分割プロセスへ余裕を与えつつ、runnerの残りをOSとnative領域へ確保します。
          NODE_OPTIONS: --max-old-space-size=4096
        run: pnpm lint

      - name: Type check
        run: pnpm check

      - name: Unit tests
        run: pnpm test:run

      - name: Build Storybook
        run: pnpm build:storybook

      - name: Codegen drift check
        run: pnpm check:codegen
